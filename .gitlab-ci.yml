stages:
  - build
  - upload
  - deploy

build:
  stage: build
  image: python:3.13
  cache:
    key:
      files:
        - requirements.txt
    paths:
      - .pip-cache/
  variables:
    PIP_CACHE_DIR: "$CI_PROJECT_DIR/.pip-cache"
  script:
    - apt-get update && apt-get install -y zip
    - pip install -r requirements.txt -t package/
    - cp -r dmarc_analyser_api package/
    - cd package && zip -r ../function.zip .
  artifacts:
    paths:
      - function.zip

upload:
  stage: upload
  image:
    name: amazon/aws-cli
    entrypoint: [""]
  id_tokens:
    AWS_TOKEN:
      aud: https://gitlab.dylanw.dev
  script:
    - export $(printf "AWS_ACCESS_KEY_ID=%s AWS_SECRET_ACCESS_KEY=%s AWS_SESSION_TOKEN=%s"
        $(aws sts assume-role-with-web-identity
          --role-arn $ROLE_ARN
          --role-session-name GitLabCI
          --web-identity-token $AWS_TOKEN
          --query 'Credentials.[AccessKeyId,SecretAccessKey,SessionToken]'
          --output text))
    - aws s3 cp function.zip s3://$ARTIFACTS_BUCKET_NAME/dmarc-analyser-api/function.zip
  only:
    - main

deploy:
  stage: deploy
  trigger:
    project: dmarc-analyser/cdk
    branch: main
    strategy: depend
  only:
    - main
